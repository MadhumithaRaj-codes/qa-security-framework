name: QA Security Framework CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest requests bandit

    - name: Start Flask App
      run: |
        nohup python app.py &
        sleep 5

    - name: Run API Tests
      run: pytest api_tests -v

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Bandit
      run: pip install bandit

    - name: Run Security Scan
      run: bandit -r .

name: QA Security Framework CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt || true
        pip install pytest selenium requests bandit

    - name: Run API + UI tests
      run: pytest -v

    - name: Run Security Scan (Bandit)
      run: bandit -r .